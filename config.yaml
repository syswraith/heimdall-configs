  - github:
      path: "https://api.github.com/users/%s"
      mode: JSON
      category: development
      timeout: 5
      headers:
        X-GitHub-Api-Version: "2026-03-10"

  - monkeytype:
      path: "https://api.monkeytype.com/users/%s/profile?isUid=false"
      mode: JSON
      category: community
      timeout: 5

  - chessdotcom:
      path: "https://www.chess.com/callback/leagues/user-league/search/%s"
      mode: JSON
      category: gaming
      timeout: 5

  - tryhackme:
      path: "https://tryhackme.com/api/v2/public-profile?username=%s"
      mode: HEADLESS_JSON
      category: development
      timeout: 15
      sleep: 5
      selectors:
        avatar: "data.avatar"
        username: "data.username"
        level: "data.level"
        country: "data.country"
        about: "data.about"
        linkedin: "data.linkedInUsername"
        github: "data.githubUsername"
        twitter: "data.twitterUsername"
        instagram: "data.instagramUsername"
        website: "data.personalWebsite"
        reddit: "data.redditUsername"
        discord: "data.discordUsername"
        calendly: "data.calendlyUrl"
        total-points: "data.totalPoints"
        badges: "data.badgesNumber"
        rooms-completed: "data.completedRoomsNumber"
        streak: "data.streak"
        rank: "data.rank"
        top-percentage: "data.topPercentage"
        top-ten-percent: "data.isInTopTenPercent"
        badge-image: "data.badgeImageURL"
        role: "data.userRole"
        league-tier: "data.leagueTier"
        joined: "data.dateSignUp"
      

