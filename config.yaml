services:

  - arduino:
      path: "https://forum.arduino.cc/u/%s.json"
      mode: JSON
      category: community
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "user.id"
        name: "user.name"
        username: "user.username"
        title: "user.title"
        joined: "user.created_at"
        last_seen: "user.last_seen_at"
        last_posted: "user.last_posted_at"
        avatar: "user.avatar_template"

  - codeberg:
      path: "https://codeberg.org/api/v1/users/%s"
      mode: JSON
      category: development
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "id"
        username: "login"
        name: "full_name"
        email: "email"
        avatar: "avatar_url"
        profile: "html_url"
        created: "created"
        location: "location"
        website: "website"

  - codeforces:
      path: "https://codeforces.com/api/user.info?handles=%s"
      mode: JSON
      category: development
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        first_name: "result.0.firstName"
        last_name: "result.0.lastName"
        country: "result.0.country"
        city: "result.0.city"
        organization: "result.0.organization"
        rating: "result.0.rating"
        max_rating: "result.0.maxRating"
        rank: "result.0.rank"
        max_rank: "result.0.maxRank"
        friend_of_count: "result.0.friendOfCount"

  - coderwall:
      path: "https://coderwall.com/%s.json"
      mode: JSON
      category: development
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "id"
        username: "username"
        name: "name"
        location: "location"
        karma: "karma"
        company: "company"
        about: "about"
        avatar: "thumbnail"
        github: "accounts.github"
        twitter: "accounts.twitter"
        linkedin: "accounts.linkedin"
        website: "accounts.website"

  - codewars:
      path: "https://www.codewars.com/api/v1/users/%s"
      mode: JSON
      category: development
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "id"
        username: "username"
        name: "name"
        honor: "honor"
        clan: "clan"
        leaderboard_position: "leaderboardPosition"
        rank: "ranks.overall.name"
        score: "ranks.overall.score"

  - elixir_forum:
      path: "https://elixirforum.com/u/%s.json"
      mode: JSON
      category: community
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "user.id"
        name: "user.name"
        username: "user.username"
        title: "user.title"
        joined: "user.created_at"
        last_seen: "user.last_seen_at"
        last_posted: "user.last_posted_at"
        avatar: "user.avatar_template"

  - f_droid:
      path: "https://forum.f-droid.org/u/%s.json"
      mode: JSON
      category: community
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "user.id"
        name: "user.name"
        username: "user.username"
        title: "user.title"
        joined: "user.created_at"
