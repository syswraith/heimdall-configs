services:

  - hackernews:
      path: "https://hacker-news.firebaseio.com/v0/user/%s.json"
      mode: JSON
      category: community
      timeout: 5
      selectors:
        username: "id"
        karma: "karma"
        created: "created"
        about: "about"

  - warframemarket:
      path: "https://api.warframe.market/v2/user/%s"
      mode: JSON
      category: gaming
      timeout: 5
      headers:
        Accept: "application/json"
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      selectors:
        id: "data.id"
        role: "data.role"
        ingame_name: "data.ingameName"
        reputation: "data.reputation"
        mastery_rank: "data.masteryRank"
        status: "data.status"
        last_seen: "data.lastSeen"
        platform: "data.platform"

  - speedrun:
      path: "https://www.speedrun.com/api/v1/users/%s"
      mode: JSON
      category: gaming
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        id: "data.id"
        name: "data.names.international"
        role: "data.role"
        signup: "data.signup"
        country: "data.location.country.names.international"
        region: "data.location.region.names.international"
        twitch: "data.twitch.uri"
        youtube: "data.youtube.uri"
        twitter: "data.twitter.uri"
  - minecraft:
      path: "https://api.mojang.com/minecraft/profile/lookup/name/%s"
      mode: JSON
      category: gaming
      timeout: 5
      headers:
        Accept: "application/json"
      selectors:
        uuid: "id"
        username: "name"

  - kick:
      path: "https://kick.com/api/v2/channels/%s"
      mode: JSON
      category: streaming
      timeout: 5
      headers:
        Accept: "application/json"
        User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36"
      selectors:
        id: "id"
        slug: "slug"
        is_banned: "is_banned"

  - apexlegends:
      path: "https://api.tracker.gg/api/v2/apex/standard/profile/origin/%s"
      mode: JSON
      category: gaming
      timeout: 5
      headers:
        Accept-Language: "en-US,en;q=0.5"
        Origin: "https://apex.tracker.gg"
        Referer: "https://apex.tracker.gg/"
      selectors:
        username: "data.platformInfo.platformUserHandle"
        avatar: "data.platformInfo.avatarUrl"
        country: "data.userInfo.countryCode"
        premium: "data.userInfo.isPremium"
        influencer: "data.userInfo.isInfluencer"
        active_legend: "data.metadata.activeLegendName"
        level: "data.segments.0.stats.level.displayValue"
        kills: "data.segments.0.stats.kills.displayValue"

