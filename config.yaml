services:
  - yandexmusic:
      path: "https://music.yandex.ru/handlers/library.jsx?owner=%s"
      mode: JSON
      category: music
      timeout: 5
      follow_redirects: true
      selectors:
        yandex_uid: "owner.uid"
        fullname: "owner.name"
        is_verified: "verified"
        liked_albums: "counts.likedAlbums"
        liked_artists: "counts.likedArtists"
        has_tracks: "hasTracks"

  - spotify:
      path: "https://api.stats.fm/api/v1/users/%s"
      mode: JSON
      category: music
      timeout: 5
      follow_redirects: true
      selectors:
        name: "item.displayName"
        image: "item.image"
        created_at: "item.createdAt"
        timezone: "item.timezone"
        bio: "item.profile.bio"
        pronouns: "item.profile.pronouns"
        is_pro: "item.isPro"
        is_plus: "item.isPlus"

  - mixcloud:
      path: "https://api.mixcloud.com/%s/"
      mode: JSON
      category: music
      timeout: 5
      follow_redirects: true
      selectors:
        name: "name"
        followers: "follower_count"
        following: "following_count"
        avatar: "pictures.large"

  - discogs:
      path: "https://api.discogs.com/users/%s"
      mode: JSON
      category: music
      timeout: 5
      selectors:
        id: "id"
        name: "name"
        location: "location"
        bio: "profile"
        joined: "registered"
        releases_contributed: "releases_contributed"
        releases_rated: "releases_rated"
        lists: "num_lists"
        collection_items: "num_collection"
        wantlist_items: "num_wantlist"
        website: "home_page"
        avatar: "avatar_url"

  - bandlab:
      path: "https://www.bandlab.com/api/v1.3/users/%s"
      mode: JSON
      category: music
      timeout: 5
      selectors:
        id: "id"
        name: "name"
        bio: "about"
        location: "place"
        joined: "createdOn"
        followers: "counters.followers"
        following: "counters.following"
        plays: "counters.plays"
        bands: "counters.bands"
        avatar: "picture.url"
