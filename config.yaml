services:
  - snapchat:
      path: "https://www.snapchat.com/@%s"
      mode: OPENGRAPH
      category: social_media
      timeout: 5
      selectors:
        title: "title"
        description: "description"
        site: "site_name"
        profile: "url"
        avatar: "image"
        favicon: "favicon"
  - tumblr:
      path: "https://www.tumblr.com/%s"
      mode: OPENGRAPH
      category: social_media
      timeout: 5
      selectors:
        title: "title"
        description: "description"
        profile: "url"
        site: "site_name"
        avatar: "image"
        favicon: "favicon"
  - ao3:
      path: "https://archiveofourown.org/users/%s/profile"
      mode: HTTP
      category: community
      timeout: 10
      container: "#main"
      redirects_to: "https://archiveofourown.org/"
      selectors:
        pseuds: "dd.pseuds"
        bio: "div.user.home.profile > div.wrapper > dl > dd:nth-child(4)"
        pfp: "div.user.home.profile > div.primary.header.module > p > a > img[attr=src]"
        joined: "div.user.home.profile > div.wrapper > dl > dd:nth-child(4)"
  - wattpad:
      path: "https://www.wattpad.com/user/%s"
      mode: HTTP
      category: community
      container: "body"
      selectors:
        error: "#urgent-announcement > div > div > div > div > strong:nth-child(1)"
        banner: "#app-container > div > header[attr=style]"
        pfp: "div.avatar.avatar-profile.center-block > div.component-wrapper > img[attr=src]"
        works: "#app-container > div > header > div.row.header-metadata > div:nth-child(1) > p:nth-child(1)"
        reading-lists: "#app-container > div > header > div.row.header-metadata > div.col-xs-4.scroll-to-element > p:nth-child(1)"
        followers: "#app-container > div > header > div.row.header-metadata > div.col-xs-4.on-followers > p.followers-count"
        bio: "#profile-about > div > div > div.description > pre"
        joined: "#profile-about > div > div > ul > li > span"
