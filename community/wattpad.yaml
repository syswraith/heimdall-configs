path: https://www.wattpad.com/user/%s
mode: HTTP
category: community
container: body
selectors:
  error: '#urgent-announcement > div > div > div > div > strong:nth-child(1)'
  banner: '#app-container > div > header[attr=style]'
  pfp: div.avatar.avatar-profile.center-block > div.component-wrapper > img[attr=src]
  works: '#app-container > div > header > div.row.header-metadata > div:nth-child(1)
    > p:nth-child(1)'
  reading-lists: '#app-container > div > header > div.row.header-metadata > div.col-xs-4.scroll-to-element
    > p:nth-child(1)'
  followers: '#app-container > div > header > div.row.header-metadata > div.col-xs-4.on-followers
    > p.followers-count'
  bio: '#profile-about > div > div > div.description > pre'
  joined: '#profile-about > div > div > ul > li > span'
