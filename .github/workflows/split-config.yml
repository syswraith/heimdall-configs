name: Split Config

on:
  push:
    paths:
      - config.yaml

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Split config
        run: python ./.split.py

      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git add .
          git rm -f config.yaml || true

          COUNT=$(tr ',' '\n' < .services_added | wc -l)

          BODY=$(cat .services_added | sed 's/,/\n- /g' | sed 's/^/- /')

          rm -f .services_added
          git add -u

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "feat(config): add ${COUNT} services" \
                     -m "${BODY}"

          git push
